<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0e">
<title>Sumareema Operations Portal</title>
</head>
<body>
<div id="root">
  <div class="boot">
    <div class="boot-logo">S</div>
    <p>Loading Sumareema Portal…</p>
  </div>
</div>

<style>
  :root{
    --navy:#0b0b0e;--navy-2:#161417;--panel:#1c1a1e;--panel-2:#262329;
    --line:rgba(212,175,55,.22);--gold:#d4af37;--gold-soft:#e7cd76;--silver:#c7ccd6;
    --ink:#f4f1e9;--ink-dim:#ada596;--green:#37d39b;--amber:#e7b04a;--red:#e8645f;
    --r:14px;--shadow:0 10px 30px rgba(0,0,0,.35);font-synthesis:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:transparent;font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  #root{font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;color:var(--ink);
    min-height:100%;line-height:1.45;-webkit-font-smoothing:antialiased}
  .boot{display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:420px;gap:18px;color:var(--ink-dim)}
  .boot-logo{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;
    font-weight:800;font-size:30px;color:var(--navy);
    background:linear-gradient(135deg,var(--gold),var(--gold-soft));
    box-shadow:var(--shadow);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{50%{transform:scale(1.06);opacity:.85}}

  .app{max-width:1180px;margin:0 auto;padding:0 14px 80px}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
    padding:12px 14px;margin:0 -14px 18px;
    background:linear-gradient(180deg,var(--navy) 70%,rgba(11,11,14,.92));
    border-bottom:1px solid var(--line);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.3px}
  .brand .mark{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    color:var(--navy);font-weight:900;background:linear-gradient(135deg,var(--gold),var(--gold-soft))}
  .brand small{display:block;font-weight:500;font-size:10.5px;color:var(--ink-dim);
    letter-spacing:1.5px;text-transform:uppercase}
  .spacer{flex:1}
  .who{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-dim)}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
    font-weight:700;font-size:12px;background:var(--panel-2);color:var(--gold-soft);border:1px solid var(--line)}
  .btn{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;transition:.15s;font-family:inherit}
  .btn:hover{border-color:var(--gold);color:var(--gold-soft)}
  .btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:var(--navy);border:none}
  .btn.gold:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 10px;font-size:12px}
  .btn.danger{color:var(--red);border-color:rgba(232,100,95,.4)}

  .nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:18px;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav button{white-space:nowrap;cursor:pointer;border:1px solid transparent;background:transparent;
    color:var(--ink-dim);padding:8px 13px;border-radius:999px;font-size:13px;font-weight:600;font-family:inherit;transition:.15s}
  .nav button:hover{color:var(--ink)}
  .nav button.active{background:var(--panel);color:var(--gold-soft);border-color:var(--line)}

  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .g3{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
  .card h3{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--gold-soft);margin-bottom:14px;font-weight:700}
  .stat{font-size:28px;font-weight:800;line-height:1}
  .stat-l{font-size:12px;color:var(--ink-dim);margin-top:6px}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink-dim)}
  h2.page{font-size:22px;font-weight:800;margin-bottom:4px}
  .sub{color:var(--ink-dim);font-size:13.5px;margin-bottom:20px}

  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.on{background:var(--green);box-shadow:0 0 0 4px rgba(55,211,155,.16)}
  .dot.idle{background:var(--amber)}
  .dot.off{background:#46423a}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
    padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--ink-dim)}
  .pill.green{color:var(--green);border-color:rgba(55,211,155,.3)}
  .pill.amber{color:var(--amber);border-color:rgba(231,176,74,.3)}
  .pill.red{color:var(--red);border-color:rgba(232,100,95,.35)}
  .pill.gold{color:var(--gold-soft);border-color:rgba(212,175,55,.35)}
  .pill.client{color:var(--silver);border-color:rgba(199,204,214,.3)}
  .row{display:flex;align-items:center;gap:12px}
  .between{justify-content:space-between}
  .muted{color:var(--ink-dim)}
  .tiny{font-size:12px}
  hr{border:none;border-top:1px solid var(--line);margin:14px 0}

  input,select,textarea{width:100%;background:var(--navy-2);border:1px solid var(--line);color:var(--ink);
    padding:11px 12px;border-radius:10px;font-size:14px;font-family:inherit;margin-top:6px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
  textarea{resize:vertical;min-height:74px}
  label{font-size:12.5px;color:var(--ink-dim);font-weight:600;display:block;margin-top:14px}
  label:first-child{margin-top:0}

  .task{border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px;background:var(--navy-2);transition:.15s}
  .task.done{opacity:.55}
  .task-top{display:flex;align-items:flex-start;gap:11px}
  .check{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;cursor:pointer;
    display:grid;place-items:center;margin-top:1px;transition:.15s}
  .check.checked{background:var(--green);border-color:var(--green)}
  .task-title{font-weight:600;font-size:14.5px}
  .task.done .task-title{text-decoration:line-through}

  .feed-item{border-left:2px solid var(--line);padding:2px 0 16px 16px;position:relative}
  .feed-item:before{content:"";position:absolute;left:-5px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--gold)}

  .clock{background:linear-gradient(135deg,var(--panel-2),var(--panel));border:1px solid var(--line);
    border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .timer{font-size:38px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}

  .doc{border:1px solid var(--line);border-radius:12px;padding:15px;background:var(--navy-2);margin-bottom:12px}
  .doc h4{color:var(--gold-soft);font-size:15px;margin-bottom:8px}
  .doc p{font-size:13.5px;color:var(--ink-dim);white-space:pre-wrap}

  .empty{text-align:center;padding:34px 18px;color:var(--ink-dim);border:1px dashed var(--line);border-radius:12px;font-size:13.5px}
  .proof-img{max-width:130px;max-height:90px;border-radius:8px;border:1px solid var(--line);margin-top:8px;cursor:pointer}
  .instr{margin-top:9px;border:1px solid var(--line);border-radius:9px;background:var(--navy);overflow:hidden}
  .instr summary{cursor:pointer;padding:8px 11px;font-size:12px;font-weight:600;color:var(--gold-soft);list-style:none}
  .instr summary::-webkit-details-marker{display:none}
  .instr summary:before{content:"▸ ";color:var(--ink-dim)}
  .instr[open] summary:before{content:"▾ "}
  .instr-body{padding:0 11px 11px;font-size:13px;color:var(--ink);white-space:pre-wrap;line-height:1.55}

  .timeline{display:flex;height:14px;border-radius:7px;overflow:hidden;background:#161417;border:1px solid var(--line)}
  .seg{height:100%}
  .seg.ok{background:var(--green)}
  .seg.gap{background:rgba(231,176,74,.55)}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--ink-dim);margin-top:8px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .swatch{width:10px;height:10px;border-radius:3px;display:inline-block}

  .modal-bg{position:fixed;inset:0;background:rgba(6,12,24,.7);z-index:90;display:grid;place-items:center;padding:16px;backdrop-filter:blur(3px)}
  .modal{background:var(--navy-2);border:1px solid var(--line);border-radius:16px;width:100%;max-width:520px;
    max-height:88vh;overflow:auto;padding:22px;box-shadow:var(--shadow)}
  .modal h3{font-size:17px;margin-bottom:4px;color:var(--ink);text-transform:none;letter-spacing:0}

  .checkin{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);width:calc(100% - 28px);max-width:440px;
    z-index:100;background:var(--panel-2);border:1px solid var(--gold);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .checkin h4{color:var(--gold-soft);font-size:14px;margin-bottom:4px}

  .login{max-width:440px;margin:50px auto;text-align:center}
  .login .mark-lg{width:78px;height:78px;border-radius:22px;margin:0 auto 18px;display:grid;place-items:center;
    font-weight:900;font-size:36px;color:var(--navy);background:linear-gradient(135deg,var(--gold),var(--gold-soft));box-shadow:var(--shadow)}
  .login h1{font-size:26px;font-weight:800}
  .login .tag{color:var(--ink-dim);font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:26px}
  .login-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow)}
  .user-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;cursor:pointer;border:1px solid transparent;text-align:left;transition:.15s}
  .user-row:hover{background:var(--navy-2);border-color:var(--line)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--gold);
    color:var(--ink);padding:12px 20px;border-radius:12px;box-shadow:var(--shadow);z-index:120;font-size:13.5px;font-weight:600}
  @media(max-width:560px){.timer{font-size:32px}.stat{font-size:22px}}
  @media(max-width:640px){
    html{-webkit-text-size-adjust:100%}
    body{font-size:16px}
    .app{padding:0 11px 90px}
    .topbar{gap:8px;padding-top:12px;padding-bottom:10px;flex-wrap:wrap}
    .topbar .who span:last-child{display:none}
    .brand small{display:none}
    .nav{gap:5px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
    .nav button{padding:9px 13px;font-size:14px}
    .grid,.g2,.g3{grid-template-columns:1fr}
    .card{padding:15px;border-radius:14px}
    .page{font-size:20px}
    .sub{font-size:13.5px}
    input,select,textarea,.btn{font-size:16px}
    .btn{padding:11px 14px}
    .btn.sm{padding:8px 11px;font-size:14px}
    .modal-bg{padding:10px;align-items:flex-end}
    .modal{max-width:100%;max-height:92vh;border-radius:18px 18px 0 0}
    .row.between{flex-wrap:wrap;gap:8px}
    .proof-img{max-width:100%}
    .task{padding:13px}
  }
</style>

// ---- shift / verification ----
function activeShift(vaId){const a=DB.shifts[vaId]||[];const l=a[a.length-1];return(l&&!l.end)?l:null;}
function currentWindow(){const now=new Date();const mins=now.getHours()*60+now.getMinutes();
  for(const w of (DB.settings.shiftWindows||[])){const[sh,sm]=w[0].split(':').map(Number),[eh,em]=w[1].split(':').map(Number);
    let a=sh*60+sm,b=eh*60+em;
    if(b<=a){if(mins>=a||mins<b)return w[0]+'–'+w[1];}
    else if(mins>=a&&mins<b)return w[0]+'–'+w[1];}
  return null;}
function isDNE(vaId){const v=DB.vas.find(x=>x.id===vaId);if(!v)return false;const t=DB.teams.find(x=>x.id===v.teamId);return!!t&&t.name==='D&E International';}
function proofTimes(vaId){const out=[];DB.projects.forEach(p=>p.tasks.forEach(t=>{if(t.assignee===vaId&&t.proof&&t.done)out.push(t.done);}));return out;}
function shiftSecondsToday(vaId){const a=DB.shifts[vaId]||[];let s=0;const t=todayKey();a.forEach(sh=>{if(sh.start.slice(0,10)!==t)return;const e=sh.end?+new Date(sh.end):Date.now();s+=(e-+new Date(sh.start))/1000;});return Math.max(0,s);}
function verifiedSecondsToday(vaId){return shiftSecondsToday(vaId);}
function cycleWindow(v){const now=new Date();const f=(v&&v.payFrequency)||'monthly';
  if(f==='weekly'){const d=new Date(now);const day=(d.getDay()+6)%7;d.setHours(0,0,0,0);d.setDate(d.getDate()-day);return{from:+d,to:Date.now(),label:'This week'};}
  if(f==='fortnightly'){return{from:Date.now()-14*864e5,to:Date.now(),label:'Last 14 days'};}
  const d=new Date(now.getFullYear(),now.getMonth(),1);return{from:+d,to:Date.now(),label:'This month'};}
function secondsInRange(vaId,from,to){const a=DB.shifts[vaId]||[];let s=0;
  a.forEach(sh=>{let start=+new Date(sh.start),end=sh.end?+new Date(sh.end):Date.now();start=Math.max(start,from);end=Math.min(end,to);if(end>start)s+=(end-start)/1000;});
  return Math.max(0,s);}
function monthSeconds(vaId){const a=DB.shifts[vaId]||[];const mo=todayKey().slice(0,7);let s=0;
  a.forEach(sh=>{if(sh.start.slice(0,7)!==mo)return;const start=+new Date(sh.start),end=sh.end?+new Date(sh.end):Date.now();s+=(end-start)/1000;});
  return s;
}
function statusOf(vaId){const a=activeShift(vaId);if(!a)return{state:'off',label:'Off shift',ping:a};
  const idle=(Date.now()-(a.lastPing||0))>6*60000;return idle?{state:'idle',label:'Idle',ping:a}:{state:'on',label:'Working now',ping:a};}
function hms(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=Math.floor(s%60);return[h,m,x].map(n=>String(n).padStart(2,'0')).join(':');}

  tpls.forEach(tpl=>{if(!p.tasks.some(x=>x._instanceOf===tpl.id&&x._day===t))

function visibleTasks(p,forVA){const t=todayKey();return p.tasks.filter(tk=>{if(forVA&&tk.locked)return false;if(tk.recurring==='daily'&&!tk._instanceOf)return false;if(tk._instanceOf)return tk._day===t;return true;});}

function timelineHTML(vaId){

function countDone(vaId,day){let n=0;DB.projects.forEach(p=>visibleTasks(p,true).forEach(tk=>{if(tk.assignee===vaId&&tk.status==='done'&&tk.done&&new Date(tk.done).toISOString().slice(0,10)===day)n++;}));return n;}
function myTaskList(me){const out=[];vaProjects(me.id).forEach(p=>visibleTasks(p,true).forEach(tk=>{if(tk.assignee===me.id)out.push({p,tk});}));return out;}

function ceoComms(){
  const all=[...DB.comms].sort((a,b)=>b.ts-a.ts);
  return`<h2 class="page">WhatsApp log</h2><p class="sub">Every WhatsApp conversation your team has logged — grouped newest first, with the VA and client attached.</p>
    <div class="card">${all.length?all.map(c=>commsEntry(c,true)).join(''):'<div class="empty">No chats logged yet.</div>'}</div>`;

function parseWhatsApp(text){
  const lines=text.split('\n');const re=/^\u200e?\[?(\d{1,2}\/\d{1,2}\/\d{2,4}),?\s+([0-9:apm\s\.]+)\]?\s*[-–]?\s*([^:]{1,40}):\s/i;
  const senders={};let count=0,first=null,last=null;
  lines.forEach(ln=>{const m=ln.match(re);if(!m)return;count++;const who=m[3].trim();senders[who]=(senders[who]||0)+1;
    const tm=m[2].trim();if(!first)first=tm;last=tm;});
  if(!count)return null;
  const names=Object.keys(senders);
  const summary=`${count} messages between ${names.slice(0,3).join(', ')}${names.length>3?' and others':''}${first?`, ${first}–${last}`:''}.`;
  return{count,summary,group:names.join(', ').slice(0,60)};
}

async function toggleClock(){const id=session.vaId;DB.shifts[id]=DB.shifts[id]||[];const a=activeShift(id);
  if(a){a.end=new Date().toISOString();}else{DB.shifts[id].push({start:new Date().toISOString(),end:null,lastPing:Date.now(),lastCheck:Date.now(),checks:[]});}
  await save('shifts',DB.shifts);render();}
function managePing(){stopPing();pingTimer=setInterval(async()=>{const a=activeShift(session.vaId);
  if(a&&document.hasFocus()){a.lastPing=Date.now();await save('shifts',DB.shifts);}},60000);}
function manageCheckins(){stopCheck();checkTimer=setInterval(()=>{const a=activeShift(session.vaId);if(!a)return;
  const iv=(DB.settings.checkInMins||30)*60000;if(document.hasFocus()&&(Date.now()-(a.lastCheck||a.start))>=iv&&!checkinOpen)openCheckin(false);},15000);}
function stopPing(){if(pingTimer){clearInterval(pingTimer);pingTimer=null;}}
function stopCheck(){if(checkTimer){clearInterval(checkTimer);checkTimer=null;}}
function stopAll(){stopPing();stopCheck();if(timerInt){clearInterval(timerInt);timerInt=null;}}
function startTimer(){if(timerInt)clearInterval(timerInt);if(session.role!=='va')return;
  timerInt=setInterval(()=>{const e=document.getElementById('liveTimer');if(!e){clearInterval(timerInt);return;}e.textContent=hms(shiftSecondsToday(session.vaId));},1000);}

function attachFile(f,arr,listEl){const isImg=f.type.startsWith('image/');

  else if(f.size<1300000){const r=new FileReader();r.onload=()=>{arr.push({type:'doc',label:f.name,data:r.result,mime:f.type});listEl.innerHTML+=`• ${escape(f.name)} (file)<br>`;};r.readAsDataURL(f);}
  else{listEl.innerHTML+=`• ${escape(f.name)} — too big to store, add it as a link instead<br>`;}}

function parsePasteText(text){
  const lines=String(text||'').replace(/\u00a0/g,' ').split('\n');
  const out=[];let cur=null,curTask=null;
  const field=(s,key)=>{const m=s.match(new RegExp(key+'\\s*:\\s*([^|]+)','i'));return m?m[1].trim():'';};
  lines.forEach(raw=>{const line=raw.trim();if(!line)return;const up=line.toUpperCase();
    if(up.startsWith('PROJECT:')){cur={project:field(line,'PROJECT'),client:field(line,'CLIENT'),team:field(line,'TEAM')};curTask=null;}
    else if(up.startsWith('TASK:')){curTask={project:cur?cur.project:'',client:cur?cur.client:'',team:cur?cur.team:'',task:field(line,'TASK'),assignee:field(line,'ASSIGN')||field(line,'ASSIGNEE'),due:field(line,'DUE'),repeats:/\bDAILY\b/i.test(line)?'daily':'',steps:[]};out.push(curTask);}
    else if(/^[-•*]/.test(line)){if(curTask)curTask.steps.push(line.replace(/^[-•*]\s*/,'').trim());}
    else if(cur){curTask={project:cur.project,client:cur.client,team:cur.team,task:line,assignee:'',due:'',repeats:'',steps:[]};out.push(curTask);}
  });
  return out.filter(t=>t.task).map(t=>({...t,steps:t.steps.join('; ')}));
}

function parseCSV(text){const rows=[];let row=[],cur='',q=false;  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(c==='\r'){}else cur+=c;}}
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>c.trim()));}

function lc(x){return String(x==null?'':x).trim().toLowerCase();}
function titleCase(s){return String(s).replace(/[-_]+/g,' ').replace(/\s+/g,' ').trim().replace(/\b\w/g,c=>c.toUpperCase());}
function detectHeader(matrix){
  for(let i=0;i<Math.min(matrix.length,20);i++){const toks=(matrix[i]||[]).map(lc);
    if(toks.includes('task')||toks.includes('project')||toks.includes('channel')||toks.some(t=>t.includes('what to do')))return{idx:i,toks};}
  return null;}
function colmap(toks){const m={};toks.forEach((t,i)=>{
    if((t==='task'||t==='channel')&&m.title==null)m.title=i;
    else if(t==='project')m.project=i;else if(t==='client')m.client=i;else if(t==='team')m.team=i;
    else if(t==='owner')m.owner=i;else if(t==='due'||t==='deadline'||t==='task due')m.due=i;
    else if(t==='project due')m.projectDue=i;else if(t==='start')m.start=i;
    else if(t==='priority')m.priority=i;else if(t==='status')m.status=i;
    else if(t==='assignee')m.assignee=i;else if(t==='steps')m.steps=i;
    else if(t==='repeats')m.repeats=i;else if(t==='description')m.desc=i;
    else if(t.includes('note')||t.includes('information')||t.includes('details'))m.notes=i;
    else if(t.includes('what to do'))m.what=i;else if(t.includes('target')||t.includes('gigs'))m.targets=i;});
  return m;}
async function processWorkbook(sheets,fileBase){
  const parsed=[];let template=false;
  sheets.forEach(s=>{if(!s.matrix||!s.matrix.length)return;const h=detectHeader(s.matrix);if(!h)return;
    const map=colmap(h.toks);if(map.title==null&&map.project==null)return;parsed.push({name:s.name,matrix:s.matrix,h,map});if(map.project!=null)template=true;});
  if(!parsed.length){toast('No task or project columns found. Use the template, or make sure a column is headed "Task".');return;}
  if(template){
    const objs=[];parsed.forEach(p=>{if(p.map.project==null)return;
      for(let i=p.h.idx+1;i<p.matrix.length;i++){const r=p.matrix[i]||[];const o={};p.h.toks.forEach((t,ci)=>{if(t)o[t]=String(r[ci]==null?'':r[ci]).trim();});if(o.project)objs.push(o);}});
    await applyImportRows(objs);return;}
  const projName=titleCase(fileBase);const team=DB.teams[0]||{id:uid(),name:'Sumareema Operations'};
  if(!DB.teams.length)DB.teams.push(team);
  let proj=DB.projects.find(p=>p.name.toLowerCase()===projName.toLowerCase()&&p.teamId===team.id);
  if(!proj){proj={id:uid(),name:projName,clientId:null,teamId:team.id,vaIds:[],due:new Date(Date.now()+90*864e5).toISOString().slice(0,10),desc:'Imported tracker. Every task is locked — unlock and delegate to your VAs as you go.',tasks:[]};DB.projects.push(proj);}
  let n=0;
  parsed.forEach(p=>{if(p.map.project!=null)return;const map=p.map;if(map.title==null)return;
    for(let i=p.h.idx+1;i<p.matrix.length;i++){const r=p.matrix[i]||[];
      const title=String(r[map.title]==null?'':r[map.title]).trim();if(!title)continue;
      const get=k=>map[k]!=null&&r[map[k]]!=null?String(r[map[k]]).trim():'';
      const details=['owner','due','priority','status','notes','what','targets','start'].map(get);
      if(!details.some(Boolean))continue;
      const meta=[];['owner','priority','status','start','due'].forEach(k=>{const v=get(k);if(v)meta.push(k[0].toUpperCase()+k.slice(1)+': '+v);});
      const body=[];const nt=get('notes'),wt=get('what'),tg=get('targets');
      if(wt)body.push(wt);if(tg)body.push('Targets: '+tg);if(nt)body.push(nt);
      const instructions=[meta.join(' · '),body.join('\n')].filter(Boolean).join('\n');
      proj.tasks.push({id:uid(),title,instructions,steps:[],attachments:[],assignee:'',status:'todo',recurring:'once',proof:null,done:null,locked:true,due:null});n++;}});
  await save('teams',DB.teams);await save('projects',DB.projects);tab='projects';
  toast(`Imported ${n} task${n===1?'':'s'} into "${projName}" — all locked. Unlock and delegate from the project.`);render();
}
function importProjectsFile(file){
  if(!file)return;const base=file.name.replace(/\.[^.]+$/,'');const isCsv=/\.csv$/i.test(file.name);const r=new FileReader();
  r.onload=async()=>{try{let sheets;
      if(isCsv){sheets=[{name:base,matrix:parseCSV(r.result)}];}
      else{if(typeof XLSX==='undefined'){toast('Excel reader did not load — save your sheet as CSV and import that.');return;}
        const wb=XLSX.read(new Uint8Array(r.result),{type:'array'});
        sheets=wb.SheetNames.map(nm=>({name:nm,matrix:XLSX.utils.sheet_to_json(wb.Sheets[nm],{header:1,defval:''})}));}
      await processWorkbook(sheets,base);
    }catch(err){toast('Could not read that file — check it is a valid Excel or CSV.');}};
  if(isCsv)r.readAsText(file);else r.readAsArrayBuffer(file);
}

    <div class="row" style="gap:6px"><button class="btn gold sm" id="pj-chase">Log chase + proof</button>${j.status!=='paid'?'<button class="btn ghost sm" id="pj-paid">Mark paid</button>':''}</div>
    <h4 style="margin:14px 0 6px">Chase history</h4>${hist}`);
  m.querySelector('#pj-chase').onclick=()=>{m.remove();openChase(id);};
  const pd=m.querySelector('#pj-paid');if(pd)pd.onclick=async()=>{j.status='paid';j.clearedAt=Date.now();await save('pending',DB.pending);m.remove();toast('Marked paid ✓');render();};}
function openChase(id){const j=DB.pending.find(x=>x.id===id);if(!j)return;let img=null;
  const m=modal(`<h3>Log chase — ${escape(j.postcode)}</h3><p class="tiny muted">${escape(j.engineer||'')}</p>
    <label>What happened</label><textarea id="ch-note" placeholder="e.g. Called, no answer, left a message"></textarea>
    <label>Screenshot proof (required)</label><input type="file" id="ch-img" accept="image/*"><div id="ch-prev"></div>
    <button class="btn gold" id="ch-save" style="margin-top:14px;width:100%">Save chase</button>`);
  const prev=m.querySelector('#ch-prev');m.querySelector('#ch-img').onchange=e=>downscale(e.target.files[0],d=>{img=d;prev.innerHTML=d?`<img src="${d}" class="proof-img">`:'';});
  m.querySelector('#ch-save').onclick=async()=>{if(!img){toast('Screenshot required');return;}
    j.chases.push({id:uid(),at:Date.now(),by:actorId(),byName:actorName(),note:m.querySelector('#ch-note').value.trim(),proof:img});
    if(j.status==='pending')j.status='chasing';
    await save('pending',DB.pending);m.remove();toast('Chase logged ✓');render();};}
function openLinkError(){let img=null;const m=modal(`<h3>Log a link error</h3>
    <label>Postcode / job</label><input id="le-pc">
    <label>Link or reference (optional)</label><input id="le-ref">
    <label>What is wrong</label><textarea id="le-note" placeholder="e.g. wrong amount, wrong engineer share"></textarea>
    <label>Screenshot you flagged it (required)</label><input type="file" id="le-img" accept="image/*"><div id="le-prev"></div>
    <button class="btn gold" id="le-save" style="margin-top:14px;width:100%">Log error</button>`);
  const prev=m.querySelector('#le-prev');m.querySelector('#le-img').onchange=e=>downscale(e.target.files[0],d=>{img=d;prev.innerHTML=d?`<img src="${d}" class="proof-img">`:'';});
  m.querySelector('#le-save').onclick=async()=>{const pc=m.querySelector('#le-pc').value.trim();if(!pc){toast('Postcode / job needed');return;}if(!img){toast('Screenshot required');return;}
    DB.linkErrors.push({id:uid(),postcode:pc,ref:m.querySelector('#le-ref').value.trim(),errorNote:m.querySelector('#le-note').value.trim(),by:actorId(),byName:actorName(),at:Date.now(),proof:img,resolved:false});
    await save('linkErrors',DB.linkErrors);m.remove();toast('Error logged ✓');render();};}
function openErrorFix(id){const e=DB.linkErrors.find(x=>x.id===id);if(!e)return;let img=null;
  const m=modal(`<h3>Mark fixed — ${escape(e.postcode||'')}</h3><label>Screenshot proof it is corrected (required)</label><input type="file" id="ef-img" accept="image/*"><div id="ef-prev"></div><button class="btn gold" id="ef-save" style="margin-top:14px;width:100%">Mark fixed</button>`);
  const prev=m.querySelector('#ef-prev');m.querySelector('#ef-img').onchange=ev=>downscale(ev.target.files[0],d=>{img=d;prev.innerHTML=d?`<img src="${d}" class="proof-img">`:'';});
  m.querySelector('#ef-save').onclick=async()=>{if(!img){toast('Screenshot required');return;}e.resolved=true;e.resolvedProof=img;e.resolvedAt=Date.now();e.resolvedBy=actorName();await save('linkErrors',DB.linkErrors);m.remove();toast('Marked fixed ✓');render();};}
function openSignoff(){let img=null;const labels=['Links checked','Pending list actioned','Invoices chased','Errors reviewed'];
  const m=modal(`<h3>Today's sign-off</h3><p class="tiny muted">Tick what you covered, add a note, and attach a screenshot of your day's work.</p>
    ${labels.map((l,i)=>`<label class="row" style="gap:8px;font-weight:400;margin-top:8px"><input type="checkbox" id="so-${i}" style="width:auto;margin:0"> ${l}</label>`).join('')}
    <label style="margin-top:10px">Notes</label><textarea id="so-note"></textarea>
    <label>Screenshot of your work (required)</label><input type="file" id="so-img" accept="image/*"><div id="so-prev"></div>
    <button class="btn gold" id="so-save" style="margin-top:14px;width:100%">Submit sign-off</button>`);
  const prev=m.querySelector('#so-prev');m.querySelector('#so-img').onchange=e=>downscale(e.target.files[0],d=>{img=d;prev.innerHTML=d?`<img src="${d}" class="proof-img">`:'';});
  m.querySelector('#so-save').onclick=async()=>{if(!img){toast('Screenshot required');return;}
    const items={};labels.forEach((l,i)=>{if(m.querySelector('#so-'+i).checked)items[l]=true;});
    DB.signoffs.push({id:uid(),date:todayKey(),by:actorId(),byName:actorName(),at:Date.now(),note:m.querySelector('#so-note').value.trim(),proof:img,items});
    await save('signoffs',DB.signoffs);m.remove();toast('Sign-off saved ✓');render();};}
function openDneRules(){const m=modal(`<h3>D&E rulings cheat-sheet</h3><p class="tiny muted">The answers VAs need so they stop asking. Edit freely.</p><textarea id="dr-body" style="min-height:320px">${escape(DB.settings.dneRules||DEFAULT_DNE_RULES)}</textarea><button class="btn gold" id="dr-save" style="margin-top:12px;width:100%">Save</button>`);
  m.querySelector('#dr-save').onclick=async()=>{DB.settings.dneRules=m.querySelector('#dr-body').value;await save('settings',DB.settings);m.remove();toast('Rulings saved ✓');render();};}
function exportPendingCSV(){
  const head=['Postcode','Engineer','Job date','Amount','Status','Chases','Last chase','Last chased by','Created'];
  const rows=DB.pending.map(j=>{const last=(j.chases||[]).slice(-1)[0];
    return[j.postcode,j.engineer,j.jobDate,j.amount,j.status,(j.chases||[]).length,last?new Date(last.at).toLocaleString('en-GB'):'',last?last.byName:'',new Date(j.createdAt).toLocaleDateString('en-GB')];});
  const csv=[head,...rows].map(r=>r.map(c=>`"${String(c==null?'':c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dne-pending-jobs.csv';document.body.appendChild(a);a.click();a.remove();}
// ---------- utils ----------
function downscale(file,cb){if(!file){cb(null);return;}const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{
  const max=900;let{width:w,height:h}=img;if(w>max||h>max){const s=max/Math.max(w,h);w*=s;h*=s;}
  const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.6));};img.src=r.result;};r.readAsDataURL(file);}
function escape(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

async function loadAllAndRender(){
  DB.teams=await load('teams',[]);DB.clients=await load('clients',[]);DB.vas=await load('vas',[]);DB.projects=await load('projects',[]);
  DB.shifts=await load('shifts',{});DB.returns=await load('returns',[]);DB.payslips=await load('payslips',[]);
  DB.welfare=await load('welfare',[]);DB.onboarding=await load('onboarding',{});DB.comms=await load('comms',[]);DB.ceoTasks=await load('ceoTasks',[]);DB.settings=await load('settings',{checkInMins:30});DB.applicants=await load('applicants',[]);
  DB.pending=await load('pending',[]);DB.linkErrors=await load('linkErrors',[]);DB.signoffs=await load('signoffs',[]);
  await sweepApplications();
  if(seedIfEmpty()){await save('teams',DB.teams);await save('clients',DB.clients);await save('vas',DB.vas);await save('projects',DB.projects);await save('welfare',DB.welfare);await save('onboarding',DB.onboarding);await save('settings',DB.settings);}
  if(migrate()){await save('teams',DB.teams);await save('projects',DB.projects);await save('clients',DB.clients);await save('vas',DB.vas);await save('settings',DB.settings);await save('applicants',DB.applicants);await save('pending',DB.pending);await save('linkErrors',DB.linkErrors);await save('signoffs',DB.signoffs);}
  await resolveAndEnter();
}
function resolveIdentityByEmail(email){
  if(!email)return null;
  email=String(email).trim().toLowerCase();
  const ceo=String(DB.settings.ceoEmail||'').trim().toLowerCase();
  if(ceo&&email===ceo)return{role:'ceo'};
  const v=DB.vas.find(x=>String(x.email||'').trim().toLowerCase()===email&&x.status!=='left');
  if(v)return{role:'va',vaId:v.id};
  return null;
}
async function resolveAndEnter(){
  let email='';
  try{const {data}=await sb.auth.getUser();email=(data&&data.user&&data.user.email)||'';}catch(e){}
  // Bootstrap: the very first account to sign in becomes the CEO (that's Fred).
  if(!DB.settings.ceoEmail&&email){DB.settings.ceoEmail=email;await save('settings',DB.settings);}
  const id=resolveIdentityByEmail(email);
  if(id){session=id;tab=id.role==='ceo'?'dashboard':'myday';saveSession(session);render();}
  else{renderNotLinked(email);}
}
function renderNotLinked(email){
  $root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div class="card" style="max-width:400px;text-align:center">'
    +'<div class="boot-logo" style="margin:0 auto 14px">S</div><h2 class="page" style="text-align:center">Almost in</h2>'
    +'<p class="sub" style="text-align:center">You\'re signed in as <b>'+escape(email||'this account')+'</b>, but it isn\'t linked to a team member yet.</p>'
    +'<p class="tiny muted">Ask Fred to add you on the Team tab using this exact email address, then sign in again.</p>'
    +'<button class="btn ghost sm" id="nl-out" style="margin-top:16px">Sign out</button></div></div>';
  const b=document.getElementById('nl-out');if(b)b.onclick=()=>accountSignOut();
}
function renderAuthGate(msg){
  if(!CONFIG_READY){$root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px"><div class="card" style="max-width:440px"><h2 class="page">Almost there</h2><p class="sub">Open index.html and paste your Supabase URL and anon key into the CONFIG block near the top of the script, then re-deploy.</p></div></div>';return;}
  $root.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px"><div class="card" style="max-width:360px;width:100%;text-align:center">'
    +'<div class="boot-logo" style="margin:0 auto 14px">S</div><h2 class="page" style="text-align:center">Sumareema Portal</h2>'
    +'<p class="sub" style="text-align:center">Sign in to your team account.</p>'
    +'<input id="au-email" type="email" placeholder="Email" autocomplete="username">'
    +'<input id="au-pw" type="password" placeholder="Password" autocomplete="current-password">'
    +(msg?'<p class="tiny" style="color:#e06a6a;margin-top:8px">'+escape(msg)+'</p>':'')
    +'<button class="btn gold" id="au-go" style="width:100%;margin-top:14px">Sign in</button></div></div>';
  const go=async()=>{const email=document.getElementById('au-email').value.trim();const pw=document.getElementById('au-pw').value;
    if(!email||!pw){renderAuthGate('Enter your email and password.');return;}
    document.getElementById('au-go').textContent='Signing in...';
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){renderAuthGate(error.message||'Could not sign in. Check your details.');}else{boot();}};
  document.getElementById('au-go').onclick=go;
  document.getElementById('au-pw').onkeydown=e=>{if(e.key==='Enter')go();};
}
async function accountSignOut(){session=null;saveSession(null);if(typeof stopAll==='function')stopAll();if(sb){try{await sb.auth.signOut();}catch(e){}}renderAuthGate();}
async function boot(){
  if(!CONFIG_READY){renderAuthGate();return;}
  let authed=false;try{const {data}=await sb.auth.getSession();authed=!!(data&&data.session);}catch(e){}
  if(!authed){renderAuthGate();return;}
  await loadAllAndRender();
}
boot();
</script>
